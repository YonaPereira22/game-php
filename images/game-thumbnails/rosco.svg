<svg viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="160" fill="#001a00"/>
  
  <!-- Border -->
  <rect width="200" height="160" fill="none" stroke="#00ff41" stroke-width="2"/>
  
  <!-- Circle/Rosco -->
  <circle cx="100" cy="80" r="50" fill="none" stroke="#00ff41" stroke-width="2"/>
  
  <!-- Segments -->
  <line x1="100" y1="30" x2="100" y2="130" stroke="#00ff41" stroke-width="1"/>
  <line x1="50" y1="80" x2="150" y2="80" stroke="#00ff41" stroke-width="1"/>
  <line x1="65" y1="45" x2="135" y2="115" stroke="#00ff41" stroke-width="1"/>
  <line x1="135" y1="45" x2="65" y2="115" stroke="#00ff41" stroke-width="1"/>
  
  <!-- Center dot -->
  <circle cx="100" cy="80" r="4" fill="#00ff41"/>
  
  <!-- Letters around circle -->
  <text x="100" y="40" font-size="11" fill="#00f5ff" text-anchor="middle" font-family="Arial" font-weight="bold">A</text>
  <text x="140" y="85" font-size="11" fill="#00f5ff" text-anchor="middle" font-family="Arial" font-weight="bold">B</text>
  <text x="100" y="130" font-size="11" fill="#00f5ff" text-anchor="middle" font-family="Arial" font-weight="bold">C</text>
  <text x="60" y="85" font-size="11" fill="#00f5ff" text-anchor="middle" font-family="Arial" font-weight="bold">D</text>
</svg>