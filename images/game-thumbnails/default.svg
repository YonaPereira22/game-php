<svg viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="160" fill="#001a00"/>
  
  <!-- Border -->
  <rect width="200" height="160" fill="none" stroke="#00ff41" stroke-width="2"/>
  
  <!-- Game controller icon -->
  <rect x="60" y="50" width="80" height="60" fill="none" stroke="#00ff41" stroke-width="2" rx="10"/>
  
  <!-- D-pad -->
  <g transform="translate(80, 70)">
    <rect x="-6" y="-12" width="4" height="10" fill="#00ff41"/>
    <rect x="2" y="-12" width="4" height="10" fill="#00ff41"/>
    <rect x="-12" y="-6" width="10" height="4" fill="#00ff41"/>
    <rect x="2" y="-6" width="10" height="4" fill="#00ff41"/>
  </g>
  
  <!-- Buttons -->
  <circle cx="130" cy="70" r="4" fill="#00ff41"/>
  <circle cx="140" cy="80" r="4" fill="#00f5ff"/>
</svg>