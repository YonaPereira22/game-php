<svg viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="160" fill="#001a00"/>
  
  <!-- Border -->
  <rect width="200" height="160" fill="none" stroke="#00ff41" stroke-width="2"/>
  
  <!-- Number display panel -->
  <rect x="30" y="30" width="140" height="50" fill="#0a0a1a" stroke="#00ff41" stroke-width="2"/>
  
  <!-- Glowing numbers -->
  <text x="100" y="70" font-size="36" fill="#00ff41" text-anchor="middle" font-family="'Courier New'" font-weight="bold" text-shadow="0 0 10px #00ff41">?</text>
  
  <!-- Control buttons -->
  <rect x="40" y="100" width="30" height="30" fill="#00ff41" stroke="#00ff41" stroke-width="1" rx="3"/>
  <text x="55" y="122" font-size="16" fill="#000" text-anchor="middle" font-family="Arial" font-weight="bold">−</text>
  
  <rect x="130" y="100" width="30" height="30" fill="#00ff41" stroke="#00ff41" stroke-width="1" rx="3"/>
  <text x="145" y="120" font-size="18" fill="#000" text-anchor="middle" font-family="Arial" font-weight="bold">+</text>
  
  <!-- Center text -->
  <text x="100" y="135" font-size="10" fill="#00f5ff" text-anchor="middle" font-family="'Courier New'">ADIVINA</text>
</svg>